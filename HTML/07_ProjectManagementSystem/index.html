<!DOCTYPE html>
<html>
<head>
    <title>Project Management System</title>
    <script>
        if (sessionStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }

        function logout() {
            sessionStorage.removeItem('isLoggedIn');
            sessionStorage.removeItem('username');
            window.location.href = 'login.html';
        }
    </script>
</head>
<body>
    <h1>Project Management System</h1>
    <p><a href="welcome.html">Welcome Page</a> <button onclick="logout()">Logout</button></p>
    
    <h2>Create Project</h2>
    <form id="projectForm">
        <input type="text" id="projectId" placeholder="Project ID" required>
        <input type="text" id="projectName" placeholder="Project Name" required>
        <input type="text" id="projectManager" placeholder="Project Manager" required>
        <input type="date" id="projectDeadline" placeholder="Deadline" required>
        <button type="submit">Create Project</button>
    </form>

    <h2>Projects</h2>
    <table id="projectTable" border="1">
        <tr>
            <th>Project ID</th>
            <th>Name</th>
            <th>Manager</th>
            <th>Deadline</th>
            <th>Status</th>
            <th>Progress</th>
            <th>Action</th>
        </tr>
    </table>

    <h2>Add Task</h2>
    <input type="text" id="projectIdTask" placeholder="Project ID">
    <input type="text" id="taskName" placeholder="Task Name">
    <input type="text" id="taskAssignee" placeholder="Assigned To">
    <button onclick="addTask()">Add Task</button>

    <h2>Tasks</h2>
    <table id="taskTable" border="1">
        <tr>
            <th>Project ID</th>
            <th>Task Name</th>
            <th>Assigned To</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
    </table>

    <h2>Project Summary</h2>
    <button onclick="showProjectSummary()">Show Summary</button>
    <div id="projectSummary"></div>

    <div id="message"></div>

    <script>
        let projects = [];
        let tasks = [];

        function setMessage(text, isError) {
            const color = isError ? 'red' : 'green';
            document.getElementById('message').innerHTML = `<p style="color:${color}">${text}</p>`;
        }

        function isOverdue(project) {
            if (!project.deadline) return false;
            const today = new Date().toISOString().split('T')[0];
            return project.deadline < today && project.status !== 'Completed';
        }

        function recalcProject(projectId) {
            const project = projects.find(p => p.id === projectId);
            if (!project) return;

            const projectTasks = tasks.filter(t => t.projectId === projectId);
            const total = projectTasks.length;
            const done = projectTasks.filter(t => t.status === 'Completed').length;

            project.progress = total === 0 ? 0 : Math.round((done / total) * 100);
            project.status = (total > 0 && done === total) ? 'Completed' : 'Active';
            if (isOverdue(project)) project.status = 'Delayed';
        }

        document.getElementById('projectForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const project = {
                id: document.getElementById('projectId').value.trim(),
                name: document.getElementById('projectName').value.trim(),
                manager: document.getElementById('projectManager').value.trim(),
                deadline: document.getElementById('projectDeadline').value,
                status: 'Active',
                progress: 0
            };

            if (projects.some(p => p.id.toLowerCase() === project.id.toLowerCase())) {
                setMessage('Project ID already exists', true);
                return;
            }
            
            projects.push(project);
            displayProjects();
            setMessage('Project created successfully', false);
            this.reset();
        });

        function displayProjects() {
            const table = document.getElementById('projectTable');
            table.innerHTML = '<tr><th>Project ID</th><th>Name</th><th>Manager</th><th>Deadline</th><th>Status</th><th>Progress</th><th>Action</th></tr>';
            
            projects.forEach((project, index) => {
                recalcProject(project.id);
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${project.id}</td>
                    <td>${project.name}</td>
                    <td>${project.manager}</td>
                    <td>${project.deadline}</td>
                    <td>${project.status}</td>
                    <td>${project.progress}%</td>
                    <td><button onclick="deleteProject(${index})">Delete</button></td>
                `;
                table.appendChild(row);
            });

            showProjectSummary();
        }

        function deleteProject(index) {
            const projectId = projects[index].id;
            projects.splice(index, 1);
            tasks = tasks.filter(task => task.projectId !== projectId);
            displayProjects();
            displayTasks();
            setMessage('Project deleted', false);
        }

        function addTask() {
            const projectId = document.getElementById('projectIdTask').value.trim();
            const taskName = document.getElementById('taskName').value.trim();
            const assignee = document.getElementById('taskAssignee').value.trim();
            
            const project = projects.find(p => p.id === projectId);
            
            if (project) {
                const task = {
                    projectId: projectId,
                    name: taskName,
                    assignee: assignee,
                    status: 'Pending'
                };
                
                tasks.push(task);
                recalcProject(projectId);
                displayTasks();
                displayProjects();
                document.getElementById('message').innerHTML = '<p>Task added successfully</p>';
                document.getElementById('projectIdTask').value = '';
                document.getElementById('taskName').value = '';
                document.getElementById('taskAssignee').value = '';
            } else {
                document.getElementById('message').innerHTML = '<p>Project not found</p>';
            }
        }

        function displayTasks() {
            const table = document.getElementById('taskTable');
            table.innerHTML = '<tr><th>Project ID</th><th>Task Name</th><th>Assigned To</th><th>Status</th><th>Action</th></tr>';
            
            tasks.forEach((task, index) => {
                const disabled = task.status === 'Completed' ? 'disabled' : '';
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${task.projectId}</td>
                    <td>${task.name}</td>
                    <td>${task.assignee}</td>
                    <td>${task.status}</td>
                    <td><button onclick="completeTask(${index})" ${disabled}>Complete</button></td>
                `;
                table.appendChild(row);
            });
        }

        function completeTask(index) {
            tasks[index].status = 'Completed';
            recalcProject(tasks[index].projectId);
            displayTasks();
            displayProjects();
        }

        function showProjectSummary() {
            const active = projects.filter(p => p.status === 'Active').length;
            const completed = projects.filter(p => p.status === 'Completed').length;
            const delayed = projects.filter(p => p.status === 'Delayed').length;
            document.getElementById('projectSummary').innerHTML =
                `<p>Active: ${active} | Completed: ${completed} | Delayed: ${delayed}</p>`;
        }
    </script>
</body>
</html>
