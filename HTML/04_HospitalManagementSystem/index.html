<!DOCTYPE html>
<html>
<head>
    <title>Hospital Management System</title>
</head>
<body>
    <h1>Hospital Management System</h1>
    
    <h2>Register Patient</h2>
    <form id="patientForm">
        <input type="text" id="patientId" placeholder="Patient ID" required>
        <input type="text" id="patientName" placeholder="Patient Name" required>
        <input type="text" id="patientAge" placeholder="Age" required>
        <input type="text" id="patientDisease" placeholder="Disease/Condition" required>
        <input type="text" id="patientDoctor" placeholder="Assigned Doctor" required>
        <button type="submit">Register Patient</button>
    </form>

    <h2>Patient Records</h2>
    <table id="patientTable" border="1">
        <tr>
            <th>Patient ID</th>
            <th>Name</th>
            <th>Age</th>
            <th>Disease/Condition</th>
            <th>Doctor</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
    </table>

    <h2>Update Patient Status</h2>
    <input type="text" id="updatePatientId" placeholder="Patient ID">
    <select id="statusSelect">
        <option value="Admitted">Admitted</option>
        <option value="Under Treatment">Under Treatment</option>
        <option value="Discharged">Discharged</option>
        <option value="Critical">Critical</option>
    </select>
    <button onclick="updateStatus()">Update Status</button>

    <h2>Search Patient</h2>
    <input type="text" id="searchPatientId" placeholder="Enter Patient ID">
    <button onclick="searchPatient()">Search</button>
    <div id="searchResult"></div>

    <div id="message"></div>

    <script>
        let patients = [];

        document.getElementById('patientForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const patient = {
                id: document.getElementById('patientId').value,
                name: document.getElementById('patientName').value,
                age: document.getElementById('patientAge').value,
                disease: document.getElementById('patientDisease').value,
                doctor: document.getElementById('patientDoctor').value,
                status: 'Admitted'
            };
            
            patients.push(patient);
            displayPatients();
            this.reset();
        });

        function displayPatients() {
            const table = document.getElementById('patientTable');
            table.innerHTML = '<tr><th>Patient ID</th><th>Name</th><th>Age</th><th>Disease/Condition</th><th>Doctor</th><th>Status</th><th>Action</th></tr>';
            
            patients.forEach((patient, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${patient.id}</td>
                    <td>${patient.name}</td>
                    <td>${patient.age}</td>
                    <td>${patient.disease}</td>
                    <td>${patient.doctor}</td>
                    <td>${patient.status}</td>
                    <td><button onclick="deletePatient(${index})">Delete</button></td>
                `;
                table.appendChild(row);
            });
        }

        function deletePatient(index) {
            patients.splice(index, 1);
            displayPatients();
        }

        function updateStatus() {
            const patientId = document.getElementById('updatePatientId').value;
            const newStatus = document.getElementById('statusSelect').value;
            const patient = patients.find(p => p.id === patientId);
            
            if (patient) {
                patient.status = newStatus;
                displayPatients();
                document.getElementById('message').innerHTML = '<p>Patient status updated</p>';
            } else {
                document.getElementById('message').innerHTML = '<p>Patient not found</p>';
            }
        }

        function searchPatient() {
            const patientId = document.getElementById('searchPatientId').value;
            const patient = patients.find(p => p.id === patientId);
            
            if (patient) {
                document.getElementById('searchResult').innerHTML = `
                    <h3>Patient Details:</h3>
                    <p>ID: ${patient.id}</p>
                    <p>Name: ${patient.name}</p>
                    <p>Age: ${patient.age}</p>
                    <p>Disease/Condition: ${patient.disease}</p>
                    <p>Doctor: ${patient.doctor}</p>
                    <p>Status: ${patient.status}</p>
                `;
            } else {
                document.getElementById('searchResult').innerHTML = '<p>Patient not found</p>';
            }
        }
    </script>
</body>
</html>
