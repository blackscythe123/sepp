<!DOCTYPE html>
<html>
<head>
    <title>Hospital Management System</title>
    <script>
        if (sessionStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }

        function logout() {
            sessionStorage.removeItem('isLoggedIn');
            sessionStorage.removeItem('username');
            window.location.href = 'login.html';
        }
    </script>
</head>
<body>
    <h1>Hospital Management System</h1>
    <p><a href="welcome.html">Welcome Page</a> <button onclick="logout()">Logout</button></p>
    
    <h2>Register Patient</h2>
    <form id="patientForm">
        <input type="text" id="patientId" placeholder="Patient ID" required>
        <input type="text" id="patientName" placeholder="Patient Name" required>
        <input type="text" id="patientAge" placeholder="Age" required>
        <input type="text" id="patientDisease" placeholder="Disease/Condition" required>
        <input type="text" id="patientDoctor" placeholder="Assigned Doctor" required>
        <button type="submit">Register Patient</button>
    </form>

    <h2>Patient Records</h2>
    <table id="patientTable" border="1">
        <tr>
            <th>Patient ID</th>
            <th>Name</th>
            <th>Age</th>
            <th>Disease/Condition</th>
            <th>Doctor</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
    </table>

    <h2>Update Patient Status</h2>
    <input type="text" id="updatePatientId" placeholder="Patient ID">
    <select id="statusSelect">
        <option value="Admitted">Admitted</option>
        <option value="Under Treatment">Under Treatment</option>
        <option value="Discharged">Discharged</option>
        <option value="Critical">Critical</option>
    </select>
    <button onclick="updateStatus()">Update Status</button>

    <h2>Search Patient</h2>
    <input type="text" id="searchPatientId" placeholder="Enter Patient ID or Name">
    <button onclick="searchPatient()">Search</button>
    <div id="searchResult"></div>

    <h2>Doctor Wise Patients</h2>
    <input type="text" id="doctorSearch" placeholder="Doctor Name">
    <button onclick="searchByDoctor()">Search Doctor Patients</button>
    <div id="doctorResult"></div>
    <button onclick="showDoctorWorkload()">Show Doctor Workload</button>
    <div id="doctorWorkload"></div>

    <h2>Critical and Status Summary</h2>
    <button onclick="showCriticalPatients()">Show Critical Patients</button>
    <button onclick="showStatusSummary()">Show Status Summary</button>
    <div id="criticalResult"></div>
    <div id="statusSummary"></div>

    <h2>Patient Payment Tracker</h2>
    <input type="text" id="paymentPatientId" placeholder="Patient ID">
    <input type="number" id="paymentAmount" placeholder="Amount Paid">
    <button onclick="recordPayment()">Record Payment</button>
    <button onclick="showPaymentSummary()">Show Payment Summary</button>
    <div id="paymentSummary"></div>

    <h2>Patient Timeline</h2>
    <input type="text" id="timelinePatientId" placeholder="Patient ID">
    <button onclick="showPatientTimeline()">Show Timeline</button>
    <div id="timelineResult"></div>

    <div id="message"></div>

    <script>
        let patients = [];
        let payments = [];

        function setMessage(text, isError) {
            const color = isError ? 'red' : 'green';
            document.getElementById('message').innerHTML = `<p style="color:${color}">${text}</p>`;
        }

        document.getElementById('patientForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const patient = {
                id: document.getElementById('patientId').value.trim(),
                name: document.getElementById('patientName').value.trim(),
                age: parseInt(document.getElementById('patientAge').value),
                disease: document.getElementById('patientDisease').value.trim(),
                doctor: document.getElementById('patientDoctor').value.trim(),
                status: 'Admitted',
                admitDate: new Date().toLocaleDateString(),
                dischargeDate: '',
                statusHistory: [{ status: 'Admitted', date: new Date().toLocaleDateString() }]
            };

            if (patients.some(p => p.id.toLowerCase() === patient.id.toLowerCase())) {
                setMessage('Patient ID already exists', true);
                return;
            }

            if (isNaN(patient.age) || patient.age <= 0) {
                setMessage('Enter valid age', true);
                return;
            }
            
            patients.push(patient);
            displayPatients();
            setMessage('Patient registered successfully', false);
            this.reset();
        });

        function displayPatients() {
            const table = document.getElementById('patientTable');
            table.innerHTML = '<tr><th>Patient ID</th><th>Name</th><th>Age</th><th>Disease/Condition</th><th>Doctor</th><th>Status</th><th>Action</th></tr>';
            
            patients.forEach((patient, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${patient.id}</td>
                    <td>${patient.name}</td>
                    <td>${patient.age}</td>
                    <td>${patient.disease}</td>
                    <td>${patient.doctor}</td>
                    <td>${patient.status}</td>
                    <td><button onclick="deletePatient(${index})">Delete</button></td>
                `;
                table.appendChild(row);
            });

            showStatusSummary();
        }

        function deletePatient(index) {
            patients.splice(index, 1);
            displayPatients();
            setMessage('Patient deleted', false);
        }

        function updateStatus() {
            const patientId = document.getElementById('updatePatientId').value;
            const newStatus = document.getElementById('statusSelect').value;
            const patient = patients.find(p => p.id === patientId);
            
            if (patient) {
                patient.status = newStatus;
                patient.statusHistory.push({ status: newStatus, date: new Date().toLocaleDateString() });
                if (newStatus === 'Discharged') {
                    patient.dischargeDate = new Date().toLocaleDateString();
                }
                displayPatients();
                setMessage('Patient status updated', false);
            } else {
                setMessage('Patient not found', true);
            }
        }

        function searchPatient() {
            const key = document.getElementById('searchPatientId').value.trim().toLowerCase();
            const results = patients.filter(p =>
                p.id.toLowerCase().includes(key) || p.name.toLowerCase().includes(key)
            );
            
            if (results.length > 0) {
                let html = '<h3>Patient Details:</h3><ul>';
                results.forEach(patient => {
                    html += `<li>${patient.id} - ${patient.name} - ${patient.disease} - ${patient.status}</li>`;
                });
                html += '</ul>';
                document.getElementById('searchResult').innerHTML = html;
            } else {
                document.getElementById('searchResult').innerHTML = '<p>Patient not found</p>';
            }
        }

        function searchByDoctor() {
            const doctor = document.getElementById('doctorSearch').value.trim().toLowerCase();
            const results = patients.filter(p => p.doctor.toLowerCase().includes(doctor));

            if (results.length === 0) {
                document.getElementById('doctorResult').innerHTML = '<p>No patients for this doctor</p>';
                return;
            }

            let html = '<ul>';
            results.forEach(patient => {
                html += `<li>${patient.id} - ${patient.name} - ${patient.status}</li>`;
            });
            html += '</ul>';
            document.getElementById('doctorResult').innerHTML = html;
        }

        function showCriticalPatients() {
            const critical = patients.filter(p => p.status === 'Critical');
            if (critical.length === 0) {
                document.getElementById('criticalResult').innerHTML = '<p>No critical patients</p>';
                return;
            }

            let html = '<h3>Critical Patients:</h3><ul>';
            critical.forEach(patient => {
                html += `<li>${patient.id} - ${patient.name} - Doctor: ${patient.doctor}</li>`;
            });
            html += '</ul>';
            document.getElementById('criticalResult').innerHTML = html;
        }

        function showStatusSummary() {
            const summary = {
                'Admitted': 0,
                'Under Treatment': 0,
                'Discharged': 0,
                'Critical': 0
            };

            patients.forEach(p => {
                summary[p.status] = (summary[p.status] || 0) + 1;
            });

            document.getElementById('statusSummary').innerHTML =
                `<p>Admitted: ${summary['Admitted']} | Under Treatment: ${summary['Under Treatment']} | Discharged: ${summary['Discharged']} | Critical: ${summary['Critical']}</p>`;
        }

        function recordPayment() {
            const patientId = document.getElementById('paymentPatientId').value.trim();
            const amount = parseFloat(document.getElementById('paymentAmount').value);
            payments.push({ patientId: patientId, amount: amount });
            showPaymentSummary();
            setMessage('Payment recorded', false);
        }

        function showPaymentSummary() {
            if (payments.length === 0) {
                document.getElementById('paymentSummary').innerHTML = '<p>No payments recorded</p>';
                return;
            }

            const paidMap = {};
            payments.forEach(p => {
                paidMap[p.patientId] = (paidMap[p.patientId] || 0) + p.amount;
            });

            let html = '<ul>';
            for (const patientId in paidMap) {
                const patient = patients.find(p => p.id === patientId);
                const name = patient ? patient.name : 'Unknown Patient';
                html += `<li>${patientId} - ${name} - Total Repaid: ${paidMap[patientId].toFixed(2)}</li>`;
            }
            html += '</ul>';
            document.getElementById('paymentSummary').innerHTML = html;
        }

        function showPatientTimeline() {
            const patientId = document.getElementById('timelinePatientId').value.trim();
            const patient = patients.find(p => p.id === patientId);

            if (!patient) {
                document.getElementById('timelineResult').innerHTML = '<p>Patient not found</p>';
                return;
            }

            let html = `<p>Patient: ${patient.name} | Admit Date: ${patient.admitDate} | Discharge Date: ${patient.dischargeDate || '-'}</p>`;
            html += '<ul>';
            patient.statusHistory.forEach(item => {
                html += `<li>${item.date} - ${item.status}</li>`;
            });
            html += '</ul>';
            document.getElementById('timelineResult').innerHTML = html;
        }

        function showDoctorWorkload() {
            if (patients.length === 0) {
                document.getElementById('doctorWorkload').innerHTML = '<p>No patients available</p>';
                return;
            }

            const map = {};
            patients.forEach(patient => {
                if (!map[patient.doctor]) {
                    map[patient.doctor] = { total: 0, critical: 0, admitted: 0, treatment: 0, discharged: 0 };
                }
                map[patient.doctor].total += 1;
                if (patient.status === 'Critical') map[patient.doctor].critical += 1;
                if (patient.status === 'Admitted') map[patient.doctor].admitted += 1;
                if (patient.status === 'Under Treatment') map[patient.doctor].treatment += 1;
                if (patient.status === 'Discharged') map[patient.doctor].discharged += 1;
            });

            let html = '<ul>';
            for (const doctor in map) {
                const d = map[doctor];
                html += `<li>${doctor}: Total ${d.total} | Admitted ${d.admitted} | Under Treatment ${d.treatment} | Discharged ${d.discharged} | Critical ${d.critical}</li>`;
            }
            html += '</ul>';
            document.getElementById('doctorWorkload').innerHTML = html;
        }
    </script>
</body>
</html>
