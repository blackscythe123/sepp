<!DOCTYPE html>
<html>
<head>
    <title>Student Management System</title>
</head>
<body>
    <h1>Student Management System</h1>
    
    <h2>Add Student</h2>
    <form id="studentForm">
        <input type="text" id="studentId" placeholder="Student ID" required>
        <input type="text" id="studentName" placeholder="Student Name" required>
        <input type="email" id="studentEmail" placeholder="Email" required>
        <input type="text" id="studentDept" placeholder="Department" required>
        <button type="submit">Add Student</button>
    </form>

    <h2>Student List</h2>
    <table id="studentTable" border="1">
        <tr>
            <th>Student ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Department</th>
            <th>Action</th>
        </tr>
    </table>

    <h2>Search Student</h2>
    <input type="text" id="searchInput" placeholder="Enter Student ID">
    <button onclick="searchStudent()">Search</button>
    <div id="searchResult"></div>

    <script>
        let students = [];

        document.getElementById('studentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const student = {
                id: document.getElementById('studentId').value,
                name: document.getElementById('studentName').value,
                email: document.getElementById('studentEmail').value,
                dept: document.getElementById('studentDept').value
            };
            
            students.push(student);
            displayStudents();
            this.reset();
        });

        function displayStudents() {
            const table = document.getElementById('studentTable');
            table.innerHTML = '<tr><th>Student ID</th><th>Name</th><th>Email</th><th>Department</th><th>Action</th></tr>';
            
            students.forEach((student, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${student.id}</td>
                    <td>${student.name}</td>
                    <td>${student.email}</td>
                    <td>${student.dept}</td>
                    <td><button onclick="deleteStudent(${index})">Delete</button></td>
                `;
                table.appendChild(row);
            });
        }

        function deleteStudent(index) {
            students.splice(index, 1);
            displayStudents();
        }

        function searchStudent() {
            const searchId = document.getElementById('searchInput').value;
            const result = students.find(s => s.id === searchId);
            
            if (result) {
                document.getElementById('searchResult').innerHTML = `
                    <h3>Found Student:</h3>
                    <p>ID: ${result.id}</p>
                    <p>Name: ${result.name}</p>
                    <p>Email: ${result.email}</p>
                    <p>Department: ${result.dept}</p>
                `;
            } else {
                document.getElementById('searchResult').innerHTML = '<p>Student not found</p>';
            }
        }
    </script>
</body>
</html>
