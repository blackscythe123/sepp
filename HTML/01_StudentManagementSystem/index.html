<!DOCTYPE html>
<html>
<head>
    <title>Student Management System</title>
    <script>
        if (sessionStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }

        function logout() {
            sessionStorage.removeItem('isLoggedIn');
            sessionStorage.removeItem('username');
            window.location.href = 'login.html';
        }
    </script>
</head>
<body>
    <h1>Student Management System</h1>
    <p><a href="welcome.html">Welcome Page</a> <button onclick="logout()">Logout</button></p>
    
    <h2>Add Student</h2>
    <form id="studentForm">
        <input type="text" id="studentId" placeholder="Student ID" required>
        <input type="text" id="studentName" placeholder="Student Name" required>
        <input type="email" id="studentEmail" placeholder="Email" required>
        <input type="text" id="studentDept" placeholder="Department" required>
        <input type="number" id="studentMark1" placeholder="Mark 1" min="0" max="100" required>
        <input type="number" id="studentMark2" placeholder="Mark 2" min="0" max="100" required>
        <input type="number" id="studentMark3" placeholder="Mark 3" min="0" max="100" required>
        <button type="submit">Add Student</button>
    </form>

    <h2>Update Department</h2>
    <input type="text" id="updateStudentId" placeholder="Student ID">
    <input type="text" id="updateStudentDept" placeholder="New Department">
    <button onclick="updateDepartment()">Update Department</button>

    <h2>Student List</h2>
    <table id="studentTable" border="1">
        <tr>
            <th>Student ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Department</th>
            <th>CGPA</th>
            <th>Action</th>
        </tr>
    </table>

    <h2>Search Student</h2>
    <input type="text" id="searchInput" placeholder="Enter Student ID or Name">
    <button onclick="searchStudent()">Search</button>
    <div id="searchResult"></div>

    <h2>Department Summary</h2>
    <button onclick="showDepartmentSummary()">Show Summary</button>
    <div id="deptSummary"></div>

    <h2>Student Marks Query</h2>
    <input type="text" id="marksQueryId" placeholder="Enter Student ID">
    <button onclick="showMarksQuery()">Show Marks</button>
    <div id="marksQueryResult"></div>

    <h2>Activity Log</h2>
    <div id="activityLog"></div>

    <div id="message"></div>

    <script>
        let students = [];
        let activityLog = [];
        let inactivityTimer;

        function setMessage(text, isError) {
            const color = isError ? 'red' : 'green';
            document.getElementById('message').innerHTML = `<p style="color:${color}">${text}</p>`;
        }

        function logActivity(action) {
            activityLog.unshift(`${new Date().toLocaleString()} - ${action}`);
            document.getElementById('activityLog').innerHTML = '<ul>' + activityLog.map(a => `<li>${a}</li>`).join('') + '</ul>';
        }

        function resetInactivityTimer() {
            clearTimeout(inactivityTimer);
            inactivityTimer = setTimeout(logout, 15 * 60 * 1000);
        }

        ['click', 'keydown', 'mousemove', 'scroll'].forEach(evt => {
            document.addEventListener(evt, resetInactivityTimer);
        });
        resetInactivityTimer();

        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        document.getElementById('studentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const student = {
                id: document.getElementById('studentId').value.trim(),
                name: document.getElementById('studentName').value.trim(),
                email: document.getElementById('studentEmail').value.trim(),
                dept: document.getElementById('studentDept').value.trim(),
                mark1: parseFloat(document.getElementById('studentMark1').value),
                mark2: parseFloat(document.getElementById('studentMark2').value),
                mark3: parseFloat(document.getElementById('studentMark3').value)
            };

            const marks = [student.mark1, student.mark2, student.mark3];
            const marksValid = marks.every(m => !isNaN(m) && m >= 0 && m <= 100);
            if (!marksValid) {
                setMessage('Marks must be between 0 and 100', true);
                return;
            }

            const average = (student.mark1 + student.mark2 + student.mark3) / 3;
            student.cgpa = (average / 10).toFixed(2);

            if (students.some(s => s.id.toLowerCase() === student.id.toLowerCase())) {
                setMessage('Student ID already exists', true);
                return;
            }

            if (!isValidEmail(student.email)) {
                setMessage('Invalid email format', true);
                return;
            }
            
            students.push(student);
            displayStudents();
            setMessage('Student added successfully', false);
            logActivity(`Added student ${student.id}`);
            this.reset();
        });

        function displayStudents() {
            const table = document.getElementById('studentTable');
            table.innerHTML = '<tr><th>Student ID</th><th>Name</th><th>Email</th><th>Department</th><th>CGPA</th><th>Action</th></tr>';
            
            students.forEach((student, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${student.id}</td>
                    <td>${student.name}</td>
                    <td>${student.email}</td>
                    <td>${student.dept}</td>
                    <td>${student.cgpa}</td>
                    <td><button onclick="deleteStudent(${index})">Delete</button></td>
                `;
                table.appendChild(row);
            });

            showDepartmentSummary();
        }

        function deleteStudent(index) {
            if (!confirm('Delete this student record?')) return;
            const id = students[index].id;
            students.splice(index, 1);
            displayStudents();
            setMessage('Student deleted', false);
            logActivity(`Deleted student ${id}`);
        }

        function searchStudent() {
            const searchKey = document.getElementById('searchInput').value.trim().toLowerCase();
            const results = students.filter(s =>
                s.id.toLowerCase().includes(searchKey) || s.name.toLowerCase().includes(searchKey)
            );
            
            if (results.length > 0) {
                let html = '<h3>Found Students:</h3><ul>';
                results.forEach(result => {
                    html += `<li>${result.id} - ${result.name} - ${result.email} - ${result.dept} - CGPA: ${result.cgpa}</li>`;
                });
                html += '</ul>';
                document.getElementById('searchResult').innerHTML = html;
                logActivity(`Searched student: ${searchKey}`);
            } else {
                document.getElementById('searchResult').innerHTML = '<p>Student not found</p>';
                logActivity(`Searched student not found: ${searchKey}`);
            }
        }

        function updateDepartment() {
            const studentId = document.getElementById('updateStudentId').value.trim();
            const newDept = document.getElementById('updateStudentDept').value.trim();
            const student = students.find(s => s.id === studentId);

            if (!student) {
                setMessage('Student not found', true);
                return;
            }

            if (!newDept) {
                setMessage('Department cannot be empty', true);
                return;
            }

            student.dept = newDept;
            displayStudents();
            setMessage('Department updated', false);
            logActivity(`Updated department for ${student.id} to ${newDept}`);
        }

        function showDepartmentSummary() {
            if (students.length === 0) {
                document.getElementById('deptSummary').innerHTML = '<p>No students available</p>';
                return;
            }

            const deptMap = {};
            students.forEach(student => {
                deptMap[student.dept] = (deptMap[student.dept] || 0) + 1;
            });

            let html = '<p>Total Students: ' + students.length + '</p><ul>';
            for (const dept in deptMap) {
                html += `<li>${dept}: ${deptMap[dept]}</li>`;
            }
            html += '</ul>';
            document.getElementById('deptSummary').innerHTML = html;
        }

        function showMarksQuery() {
            const studentId = document.getElementById('marksQueryId').value.trim();
            const student = students.find(s => s.id === studentId);

            if (!student) {
                document.getElementById('marksQueryResult').innerHTML = '<p>Student not found</p>';
                return;
            }

            document.getElementById('marksQueryResult').innerHTML =
                `<p>${student.name} | Mark1: ${student.mark1} | Mark2: ${student.mark2} | Mark3: ${student.mark3} | CGPA: ${student.cgpa}</p>`;
        }
    </script>
</body>
</html>
