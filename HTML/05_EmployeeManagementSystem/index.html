<!DOCTYPE html>
<html>
<head>
    <title>Employee Management System</title>
    <script>
        if (sessionStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }

        function logout() {
            sessionStorage.removeItem('isLoggedIn');
            sessionStorage.removeItem('username');
            window.location.href = 'login.html';
        }
    </script>
</head>
<body>
    <h1>Employee Management System</h1>
    <p><a href="welcome.html">Welcome Page</a> <button onclick="logout()">Logout</button></p>
    
    <h2>Add Employee</h2>
    <form id="employeeForm">
        <input type="text" id="empId" placeholder="Employee ID" required>
        <input type="text" id="empName" placeholder="Employee Name" required>
        <input type="text" id="empDept" placeholder="Department" required>
        <input type="text" id="empPosition" placeholder="Position" required>
        <input type="number" id="empSalary" placeholder="Salary" required>
        <button type="submit">Add Employee</button>
    </form>

    <h2>Update Employee</h2>
    <input type="text" id="updateEmpId" placeholder="Employee ID">
    <input type="text" id="updateEmpPosition" placeholder="New Position">
    <input type="number" id="updateEmpSalary" placeholder="New Salary">
    <button onclick="updateEmployee()">Update Employee</button>

    <h2>Employee Directory</h2>
    <table id="employeeTable" border="1">
        <tr>
            <th>Employee ID</th>
            <th>Name</th>
            <th>Department</th>
            <th>Position</th>
            <th>Salary</th>
            <th>Action</th>
        </tr>
    </table>

    <h2>Filter by Department</h2>
    <input type="text" id="deptFilter" placeholder="Enter Department">
    <button onclick="filterByDept()">Filter</button>
    <div id="filterResult"></div>

    <h2>Employee Count by Department</h2>
    <button onclick="deptCount()">Show Count</button>
    <div id="deptCountResult"></div>

    <h2>Payroll by Department</h2>
    <button onclick="salarySummary()">Show Payroll Summary</button>
    <div id="salarySummaryResult"></div>

    <div id="message"></div>

    <script>
        let employees = [];

        function setMessage(text, isError) {
            const color = isError ? 'red' : 'green';
            document.getElementById('message').innerHTML = `<p style="color:${color}">${text}</p>`;
        }

        document.getElementById('employeeForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const employee = {
                id: document.getElementById('empId').value.trim(),
                name: document.getElementById('empName').value.trim(),
                dept: document.getElementById('empDept').value.trim(),
                position: document.getElementById('empPosition').value.trim(),
                salary: parseFloat(document.getElementById('empSalary').value)
            };

            if (employees.some(e => e.id.toLowerCase() === employee.id.toLowerCase())) {
                setMessage('Employee ID already exists', true);
                return;
            }

            if (isNaN(employee.salary) || employee.salary <= 0) {
                setMessage('Salary must be greater than 0', true);
                return;
            }
            
            employees.push(employee);
            displayEmployees();
            setMessage('Employee added successfully', false);
            this.reset();
        });

        function displayEmployees() {
            const table = document.getElementById('employeeTable');
            table.innerHTML = '<tr><th>Employee ID</th><th>Name</th><th>Department</th><th>Position</th><th>Salary</th><th>Action</th></tr>';
            
            employees.forEach((emp, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${emp.id}</td>
                    <td>${emp.name}</td>
                    <td>${emp.dept}</td>
                    <td>${emp.position}</td>
                    <td>${emp.salary}</td>
                    <td><button onclick="deleteEmployee(${index})">Delete</button></td>
                `;
                table.appendChild(row);
            });

            deptCount();
            salarySummary();
        }

        function deleteEmployee(index) {
            employees.splice(index, 1);
            displayEmployees();
            setMessage('Employee deleted', false);
        }

        function filterByDept() {
            const dept = document.getElementById('deptFilter').value;
            const filtered = employees.filter(e => e.dept.toLowerCase() === dept.toLowerCase());
            
            if (filtered.length > 0) {
                let result = '<h3>Employees in ' + dept + ':</h3><table border="1"><tr><th>ID</th><th>Name</th><th>Position</th><th>Salary</th></tr>';
                filtered.forEach(emp => {
                    result += `<tr><td>${emp.id}</td><td>${emp.name}</td><td>${emp.position}</td><td>${emp.salary}</td></tr>`;
                });
                result += '</table>';
                document.getElementById('filterResult').innerHTML = result;
            } else {
                document.getElementById('filterResult').innerHTML = '<p>No employees found in this department</p>';
            }
        }

        function deptCount() {
            const deptMap = {};
            employees.forEach(emp => {
                deptMap[emp.dept] = (deptMap[emp.dept] || 0) + 1;
            });
            
            let result = '<h3>Employee Count by Department:</h3><ul>';
            for (let dept in deptMap) {
                result += `<li>${dept}: ${deptMap[dept]} employees</li>`;
            }
            result += '</ul>';
            document.getElementById('deptCountResult').innerHTML = result;
        }

        function updateEmployee() {
            const id = document.getElementById('updateEmpId').value.trim();
            const position = document.getElementById('updateEmpPosition').value.trim();
            const salary = parseFloat(document.getElementById('updateEmpSalary').value);
            const employee = employees.find(e => e.id === id);

            if (!employee) {
                setMessage('Employee not found', true);
                return;
            }

            if (position) employee.position = position;
            if (!isNaN(salary) && salary > 0) employee.salary = salary;

            displayEmployees();
            setMessage('Employee updated', false);
        }

        function salarySummary() {
            const summary = {};
            employees.forEach(emp => {
                summary[emp.dept] = (summary[emp.dept] || 0) + emp.salary;
            });

            let result = '<h3>Payroll by Department:</h3><ul>';
            for (const dept in summary) {
                result += `<li>${dept}: ${summary[dept].toFixed(2)}</li>`;
            }
            result += '</ul>';
            document.getElementById('salarySummaryResult').innerHTML = result;
        }
    </script>
</body>
</html>
