<!DOCTYPE html>
<html>
<head>
    <title>Library Management System</title>
    <script>
        if (sessionStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }

        function logout() {
            sessionStorage.removeItem('isLoggedIn');
            sessionStorage.removeItem('username');
            window.location.href = 'login.html';
        }
    </script>
</head>
<body>
    <h1>Library Management System</h1>
    <p><a href="welcome.html">Welcome Page</a> <button onclick="logout()">Logout</button></p>
    
    <h2>Add Book</h2>
    <form id="bookForm">
        <input type="text" id="bookId" placeholder="Book ID" required>
        <input type="text" id="bookTitle" placeholder="Book Title" required>
        <input type="text" id="bookAuthor" placeholder="Author" required>
        <input type="text" id="bookIsbn" placeholder="ISBN" required>
        <button type="submit">Add Book</button>
    </form>

    <h2>Book Inventory</h2>
    <table id="bookTable" border="1">
        <tr>
            <th>Book ID</th>
            <th>Title</th>
            <th>Author</th>
            <th>ISBN</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
    </table>

    <h2>Issue Book</h2>
    <input type="text" id="issueBookId" placeholder="Enter Book ID">
    <input type="text" id="issueMemberId" placeholder="Member ID">
    <button onclick="issueBook()">Issue Book</button>

    <h2>Return Book</h2>
    <input type="text" id="returnBookId" placeholder="Enter Book ID">
    <button onclick="returnBook()">Return Book</button>

    <div id="message"></div>

    <script>
        let books = [];

        document.getElementById('bookForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const book = {
                id: document.getElementById('bookId').value,
                title: document.getElementById('bookTitle').value,
                author: document.getElementById('bookAuthor').value,
                isbn: document.getElementById('bookIsbn').value,
                status: 'Available'
            };
            
            books.push(book);
            displayBooks();
            this.reset();
        });

        function displayBooks() {
            const table = document.getElementById('bookTable');
            table.innerHTML = '<tr><th>Book ID</th><th>Title</th><th>Author</th><th>ISBN</th><th>Status</th><th>Action</th></tr>';
            
            books.forEach((book, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${book.id}</td>
                    <td>${book.title}</td>
                    <td>${book.author}</td>
                    <td>${book.isbn}</td>
                    <td>${book.status}</td>
                    <td><button onclick="deleteBook(${index})">Delete</button></td>
                `;
                table.appendChild(row);
            });
        }

        function deleteBook(index) {
            books.splice(index, 1);
            displayBooks();
        }

        function issueBook() {
            const bookId = document.getElementById('issueBookId').value;
            const memberId = document.getElementById('issueMemberId').value;
            const book = books.find(b => b.id === bookId);
            
            if (book && book.status === 'Available') {
                book.status = 'Issued to ' + memberId;
                displayBooks();
                document.getElementById('message').innerHTML = '<p>Book issued successfully</p>';
            } else {
                document.getElementById('message').innerHTML = '<p>Book not available</p>';
            }
        }

        function returnBook() {
            const bookId = document.getElementById('returnBookId').value;
            const book = books.find(b => b.id === bookId);
            
            if (book) {
                book.status = 'Available';
                displayBooks();
                document.getElementById('message').innerHTML = '<p>Book returned successfully</p>';
            } else {
                document.getElementById('message').innerHTML = '<p>Book not found</p>';
            }
        }
    </script>
</body>
</html>
