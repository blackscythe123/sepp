<!DOCTYPE html>
<html>
<head>
    <title>Inventory Management System</title>
</head>
<body>
    <h1>Inventory Management System</h1>
    
    <h2>Add Product</h2>
    <form id="productForm">
        <input type="text" id="productId" placeholder="Product ID" required>
        <input type="text" id="productName" placeholder="Product Name" required>
        <input type="number" id="productQuantity" placeholder="Quantity" required>
        <input type="number" id="productPrice" placeholder="Price" required>
        <button type="submit">Add Product</button>
    </form>

    <h2>Product Inventory</h2>
    <table id="productTable" border="1">
        <tr>
            <th>Product ID</th>
            <th>Name</th>
            <th>Quantity</th>
            <th>Price</th>
            <th>Total Value</th>
            <th>Action</th>
        </tr>
    </table>

    <h2>Update Stock</h2>
    <input type="text" id="updateProductId" placeholder="Product ID">
    <input type="number" id="updateQuantity" placeholder="Quantity to add/subtract" required>
    <button onclick="updateStock()">Update Stock</button>

    <h2>Low Stock Alert (Less than 20)</h2>
    <button onclick="checkLowStock()">Check Low Stock</button>
    <div id="lowStockAlert"></div>

    <div id="message"></div>

    <script>
        let products = [];

        document.getElementById('productForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const product = {
                id: document.getElementById('productId').value,
                name: document.getElementById('productName').value,
                quantity: parseInt(document.getElementById('productQuantity').value),
                price: parseFloat(document.getElementById('productPrice').value)
            };
            
            products.push(product);
            displayProducts();
            this.reset();
        });

        function displayProducts() {
            const table = document.getElementById('productTable');
            table.innerHTML = '<tr><th>Product ID</th><th>Name</th><th>Quantity</th><th>Price</th><th>Total Value</th><th>Action</th></tr>';
            
            products.forEach((product, index) => {
                const totalValue = product.quantity * product.price;
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${product.id}</td>
                    <td>${product.name}</td>
                    <td>${product.quantity}</td>
                    <td>${product.price}</td>
                    <td>${totalValue.toFixed(2)}</td>
                    <td><button onclick="deleteProduct(${index})">Delete</button></td>
                `;
                table.appendChild(row);
            });
        }

        function deleteProduct(index) {
            products.splice(index, 1);
            displayProducts();
        }

        function updateStock() {
            const productId = document.getElementById('updateProductId').value;
            const quantityChange = parseInt(document.getElementById('updateQuantity').value);
            const product = products.find(p => p.id === productId);
            
            if (product) {
                product.quantity += quantityChange;
                displayProducts();
                document.getElementById('message').innerHTML = '<p>Stock updated successfully</p>';
            } else {
                document.getElementById('message').innerHTML = '<p>Product not found</p>';
            }
        }

        function checkLowStock() {
            const lowStockItems = products.filter(p => p.quantity < 20);
            
            if (lowStockItems.length > 0) {
                let alert = '<h3>Low Stock Items:</h3><ul>';
                lowStockItems.forEach(item => {
                    alert += `<li>${item.name} (ID: ${item.id}) - Quantity: ${item.quantity}</li>`;
                });
                alert += '</ul>';
                document.getElementById('lowStockAlert').innerHTML = alert;
            } else {
                document.getElementById('lowStockAlert').innerHTML = '<p>All items have sufficient stock</p>';
            }
        }
    </script>
</body>
</html>
