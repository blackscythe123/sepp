<!DOCTYPE html>
<html>
<head>
    <title>Inventory Management System</title>
    <script>
        if (sessionStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }

        function logout() {
            sessionStorage.removeItem('isLoggedIn');
            sessionStorage.removeItem('username');
            window.location.href = 'login.html';
        }
    </script>
</head>
<body>
    <h1>Inventory Management System</h1>
    <p><a href="welcome.html">Welcome Page</a> <button onclick="logout()">Logout</button></p>
    
    <h2>Add Product</h2>
    <form id="productForm">
        <input type="text" id="productId" placeholder="Product ID" required>
        <input type="text" id="productName" placeholder="Product Name" required>
        <input type="number" id="productQuantity" placeholder="Quantity" required>
        <input type="number" id="productPrice" placeholder="Price" required>
        <button type="submit">Add Product</button>
    </form>

    <h2>Product Inventory</h2>
    <table id="productTable" border="1">
        <tr>
            <th>Product ID</th>
            <th>Name</th>
            <th>Quantity</th>
            <th>Price</th>
            <th>Total Value</th>
            <th>Action</th>
        </tr>
    </table>

    <h2>Update Stock</h2>
    <input type="text" id="updateProductId" placeholder="Product ID">
    <input type="number" id="updateQuantity" placeholder="Quantity to add/subtract" required>
    <button onclick="updateStock()">Update Stock</button>

    <h2>Low Stock Alert (Less than 20)</h2>
    <button onclick="checkLowStock()">Check Low Stock</button>
    <div id="lowStockAlert"></div>

    <h2>Search Product</h2>
    <input type="text" id="searchProductInput" placeholder="Product ID or Name">
    <button onclick="searchProduct()">Search</button>
    <div id="searchProductResult"></div>

    <h2>Inventory Summary</h2>
    <button onclick="showInventorySummary()">Show Summary</button>
    <div id="inventorySummary"></div>

    <div id="message"></div>

    <script>
        let products = [];

        function setMessage(text, isError) {
            const color = isError ? 'red' : 'green';
            document.getElementById('message').innerHTML = `<p style="color:${color}">${text}</p>`;
        }

        document.getElementById('productForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const product = {
                id: document.getElementById('productId').value.trim(),
                name: document.getElementById('productName').value.trim(),
                quantity: parseInt(document.getElementById('productQuantity').value),
                price: parseFloat(document.getElementById('productPrice').value)
            };

            if (products.some(p => p.id.toLowerCase() === product.id.toLowerCase())) {
                setMessage('Product ID already exists', true);
                return;
            }

            if (isNaN(product.quantity) || product.quantity < 0 || isNaN(product.price) || product.price < 0) {
                setMessage('Quantity and price must be valid positive values', true);
                return;
            }
            
            products.push(product);
            displayProducts();
            setMessage('Product added successfully', false);
            this.reset();
        });

        function displayProducts() {
            const table = document.getElementById('productTable');
            table.innerHTML = '<tr><th>Product ID</th><th>Name</th><th>Quantity</th><th>Price</th><th>Total Value</th><th>Action</th></tr>';
            
            products.forEach((product, index) => {
                const totalValue = product.quantity * product.price;
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${product.id}</td>
                    <td>${product.name}</td>
                    <td>${product.quantity}</td>
                    <td>${product.price}</td>
                    <td>${totalValue.toFixed(2)}</td>
                    <td><button onclick="deleteProduct(${index})">Delete</button></td>
                `;
                table.appendChild(row);
            });

            showInventorySummary();
        }

        function deleteProduct(index) {
            products.splice(index, 1);
            displayProducts();
            setMessage('Product deleted', false);
        }

        function updateStock() {
            const productId = document.getElementById('updateProductId').value.trim();
            const quantityChange = parseInt(document.getElementById('updateQuantity').value);
            const product = products.find(p => p.id === productId);
            
            if (product) {
                if (isNaN(quantityChange)) {
                    setMessage('Enter a valid quantity change', true);
                    return;
                }

                if (product.quantity + quantityChange < 0) {
                    setMessage('Stock cannot be negative', true);
                    return;
                }

                product.quantity += quantityChange;
                displayProducts();
                setMessage('Stock updated successfully', false);
            } else {
                setMessage('Product not found', true);
            }
        }

        function checkLowStock() {
            const lowStockItems = products.filter(p => p.quantity < 20);
            
            if (lowStockItems.length > 0) {
                let alert = '<h3>Low Stock Items:</h3><ul>';
                lowStockItems.forEach(item => {
                    alert += `<li>${item.name} (ID: ${item.id}) - Quantity: ${item.quantity}</li>`;
                });
                alert += '</ul>';
                document.getElementById('lowStockAlert').innerHTML = alert;
            } else {
                document.getElementById('lowStockAlert').innerHTML = '<p>All items have sufficient stock</p>';
            }
        }

        function showInventorySummary() {
            const totalProducts = products.length;
            const totalUnits = products.reduce((sum, product) => sum + product.quantity, 0);
            const totalValue = products.reduce((sum, product) => sum + (product.quantity * product.price), 0);

            document.getElementById('inventorySummary').innerHTML =
                `<p>Total Products: ${totalProducts} | Total Units: ${totalUnits} | Total Inventory Value: ${totalValue.toFixed(2)}</p>`;
        }

        function searchProduct() {
            const key = document.getElementById('searchProductInput').value.trim().toLowerCase();
            const filtered = products.filter(product =>
                product.id.toLowerCase().includes(key) || product.name.toLowerCase().includes(key)
            );

            if (filtered.length === 0) {
                document.getElementById('searchProductResult').innerHTML = '<p>No matching products</p>';
                return;
            }

            let html = '<ul>';
            filtered.forEach(product => {
                html += `<li>${product.id} - ${product.name} - Qty: ${product.quantity} - Price: ${product.price}</li>`;
            });
            html += '</ul>';
            document.getElementById('searchProductResult').innerHTML = html;
        }
    </script>
</body>
</html>
