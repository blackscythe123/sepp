<!DOCTYPE html>
<html>
<head>
    <title>Restaurant Management System</title>
    <script>
        if (sessionStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }

        function logout() {
            sessionStorage.removeItem('isLoggedIn');
            sessionStorage.removeItem('username');
            window.location.href = 'login.html';
        }
    </script>
</head>
<body>
    <h1>Restaurant Management System</h1>
    <p><a href="welcome.html">Welcome Page</a> <button onclick="logout()">Logout</button></p>
    
    <h2>Add Menu Item</h2>
    <form id="menuForm">
        <input type="text" id="itemId" placeholder="Item ID" required>
        <input type="text" id="itemName" placeholder="Dish Name" required>
        <input type="text" id="itemCategory" placeholder="Category" required>
        <input type="number" id="itemPrice" placeholder="Price" required>
        <button type="submit">Add Item</button>
    </form>

    <h2>Menu</h2>
    <table id="menuTable" border="1">
        <tr>
            <th>Item ID</th>
            <th>Dish Name</th>
            <th>Category</th>
            <th>Price</th>
            <th>Action</th>
        </tr>
    </table>

    <h2>Place Order</h2>
    <input type="text" id="orderId" placeholder="Order ID" required>
    <input type="text" id="itemIdOrder" placeholder="Item ID" required>
    <input type="number" id="quantity" placeholder="Quantity" required>
    <button onclick="placeOrder()">Place Order</button>

    <h2>Order History</h2>
    <table id="orderTable" border="1">
        <tr>
            <th>Order ID</th>
            <th>Item ID</th>
            <th>Quantity</th>
            <th>Total Amount</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
    </table>

    <div id="message"></div>

    <script>
        let menuItems = [];
        let orders = [];

        document.getElementById('menuForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const item = {
                id: document.getElementById('itemId').value,
                name: document.getElementById('itemName').value,
                category: document.getElementById('itemCategory').value,
                price: parseFloat(document.getElementById('itemPrice').value)
            };
            
            menuItems.push(item);
            displayMenu();
            this.reset();
        });

        function displayMenu() {
            const table = document.getElementById('menuTable');
            table.innerHTML = '<tr><th>Item ID</th><th>Dish Name</th><th>Category</th><th>Price</th><th>Action</th></tr>';
            
            menuItems.forEach((item, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${item.id}</td>
                    <td>${item.name}</td>
                    <td>${item.category}</td>
                    <td>${item.price}</td>
                    <td><button onclick="deleteMenuItem(${index})">Delete</button></td>
                `;
                table.appendChild(row);
            });
        }

        function deleteMenuItem(index) {
            menuItems.splice(index, 1);
            displayMenu();
        }

        function placeOrder() {
            const orderId = document.getElementById('orderId').value;
            const itemId = document.getElementById('itemIdOrder').value;
            const qty = parseInt(document.getElementById('quantity').value);
            
            const item = menuItems.find(m => m.id === itemId);
            
            if (item) {
                const order = {
                    orderId: orderId,
                    itemId: itemId,
                    quantity: qty,
                    totalAmount: item.price * qty,
                    status: 'Pending'
                };
                
                orders.push(order);
                displayOrders();
                document.getElementById('message').innerHTML = '<p>Order placed successfully</p>';
                document.getElementById('orderId').value = '';
                document.getElementById('itemIdOrder').value = '';
                document.getElementById('quantity').value = '';
            } else {
                document.getElementById('message').innerHTML = '<p>Item not found in menu</p>';
            }
        }

        function displayOrders() {
            const table = document.getElementById('orderTable');
            table.innerHTML = '<tr><th>Order ID</th><th>Item ID</th><th>Quantity</th><th>Total Amount</th><th>Status</th><th>Action</th></tr>';
            
            orders.forEach((order, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${order.orderId}</td>
                    <td>${order.itemId}</td>
                    <td>${order.quantity}</td>
                    <td>${order.totalAmount}</td>
                    <td>${order.status}</td>
                    <td><button onclick="completeOrder(${index})">Complete</button></td>
                `;
                table.appendChild(row);
            });
        }

        function completeOrder(index) {
            orders[index].status = 'Completed';
            displayOrders();
        }
    </script>
</body>
</html>
