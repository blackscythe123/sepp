<!DOCTYPE html>
<html>
<head>
    <title>Restaurant Management System</title>
    <script>
        if (sessionStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }

        function logout() {
            sessionStorage.removeItem('isLoggedIn');
            sessionStorage.removeItem('username');
            window.location.href = 'login.html';
        }
    </script>
</head>
<body>
    <h1>Restaurant Management System</h1>
    <p><a href="welcome.html">Welcome Page</a> <button onclick="logout()">Logout</button></p>
    
    <h2>Add Menu Item</h2>
    <form id="menuForm">
        <input type="text" id="itemId" placeholder="Item ID" required>
        <input type="text" id="itemName" placeholder="Dish Name" required>
        <input type="text" id="itemCategory" placeholder="Category" required>
        <input type="number" id="itemPrice" placeholder="Price" required>
        <button type="submit">Add Item</button>
    </form>

    <h2>Menu</h2>
    <table id="menuTable" border="1">
        <tr>
            <th>Item ID</th>
            <th>Dish Name</th>
            <th>Category</th>
            <th>Price</th>
            <th>Action</th>
        </tr>
    </table>

    <h2>Place Order</h2>
    <input type="text" id="orderId" placeholder="Order ID" required>
    <input type="text" id="itemIdOrder" placeholder="Item ID" required>
    <input type="number" id="quantity" placeholder="Quantity" required>
    <button onclick="placeOrder()">Place Order</button>

    <h2>Order History</h2>
    <table id="orderTable" border="1">
        <tr>
            <th>Order ID</th>
            <th>Item ID</th>
            <th>Quantity</th>
            <th>Total Amount</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
    </table>

    <h2>Menu Category Filter</h2>
    <input type="text" id="categoryFilter" placeholder="Category">
    <button onclick="filterMenuByCategory()">Filter Menu</button>
    <div id="categoryResult"></div>

    <h2>Revenue Summary</h2>
    <button onclick="showRevenueSummary()">Show Revenue</button>
    <div id="revenueSummary"></div>

    <h2>Generate Bill</h2>
    <input type="text" id="billOrderId" placeholder="Order ID">
    <button onclick="generateBill()">Generate Bill</button>
    <div id="billResult"></div>

    <h2>Search Order</h2>
    <input type="text" id="orderSearchId" placeholder="Order ID">
    <select id="orderStatusFilter">
        <option value="All">All</option>
        <option value="Pending">Pending</option>
        <option value="Preparing">Preparing</option>
        <option value="Ready">Ready</option>
        <option value="Delivered">Delivered</option>
    </select>
    <button onclick="searchOrder()">Search Order</button>
    <div id="orderSearchResult"></div>

    <div id="message"></div>

    <script>
        let menuItems = [];
        let orders = [];

        const statusFlow = ['Pending', 'Preparing', 'Ready', 'Delivered'];

        function setMessage(text, isError) {
            const color = isError ? 'red' : 'green';
            document.getElementById('message').innerHTML = `<p style="color:${color}">${text}</p>`;
        }

        document.getElementById('menuForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const item = {
                id: document.getElementById('itemId').value.trim(),
                name: document.getElementById('itemName').value.trim(),
                category: document.getElementById('itemCategory').value.trim(),
                price: parseFloat(document.getElementById('itemPrice').value)
            };

            if (menuItems.some(m => m.id.toLowerCase() === item.id.toLowerCase())) {
                setMessage('Item ID already exists', true);
                return;
            }

            if (isNaN(item.price) || item.price <= 0) {
                setMessage('Price must be greater than 0', true);
                return;
            }
            
            menuItems.push(item);
            displayMenu();
            setMessage('Menu item added', false);
            this.reset();
        });

        function displayMenu() {
            const table = document.getElementById('menuTable');
            table.innerHTML = '<tr><th>Item ID</th><th>Dish Name</th><th>Category</th><th>Price</th><th>Action</th></tr>';
            
            menuItems.forEach((item, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${item.id}</td>
                    <td>${item.name}</td>
                    <td>${item.category}</td>
                    <td>${item.price}</td>
                    <td><button onclick="deleteMenuItem(${index})">Delete</button></td>
                `;
                table.appendChild(row);
            });
        }

        function deleteMenuItem(index) {
            menuItems.splice(index, 1);
            displayMenu();
            setMessage('Menu item deleted', false);
        }

        function placeOrder() {
            const orderId = document.getElementById('orderId').value.trim();
            const itemId = document.getElementById('itemIdOrder').value.trim();
            const qty = parseInt(document.getElementById('quantity').value);
            
            const item = menuItems.find(m => m.id === itemId);

            if (orders.some(o => o.orderId.toLowerCase() === orderId.toLowerCase())) {
                setMessage('Order ID already exists', true);
                return;
            }

            if (isNaN(qty) || qty <= 0) {
                setMessage('Quantity must be greater than 0', true);
                return;
            }
            
            if (item) {
                const order = {
                    orderId: orderId,
                    itemId: itemId,
                    quantity: qty,
                    totalAmount: item.price * qty,
                    status: 'Pending'
                };
                
                orders.push(order);
                displayOrders();
                setMessage('Order placed successfully', false);
                document.getElementById('orderId').value = '';
                document.getElementById('itemIdOrder').value = '';
                document.getElementById('quantity').value = '';
            } else {
                setMessage('Item not found in menu', true);
            }
        }

        function displayOrders() {
            const table = document.getElementById('orderTable');
            table.innerHTML = '<tr><th>Order ID</th><th>Item ID</th><th>Quantity</th><th>Total Amount</th><th>Status</th><th>Action</th></tr>';
            
            orders.forEach((order, index) => {
                const nextDisabled = order.status === 'Delivered' ? 'disabled' : '';
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${order.orderId}</td>
                    <td>${order.itemId}</td>
                    <td>${order.quantity}</td>
                    <td>${order.totalAmount}</td>
                    <td>${order.status}</td>
                    <td>
                        <button onclick="advanceOrderStatus(${index})" ${nextDisabled}>Next Status</button>
                        <button onclick="cancelOrder(${index})">Cancel</button>
                    </td>
                `;
                table.appendChild(row);
            });

            showRevenueSummary();
        }

        function advanceOrderStatus(index) {
            const current = orders[index].status;
            const currentIndex = statusFlow.indexOf(current);
            if (currentIndex >= 0 && currentIndex < statusFlow.length - 1) {
                orders[index].status = statusFlow[currentIndex + 1];
            }
            displayOrders();
        }

        function cancelOrder(index) {
            orders.splice(index, 1);
            displayOrders();
            setMessage('Order cancelled', false);
        }

        function filterMenuByCategory() {
            const category = document.getElementById('categoryFilter').value.trim().toLowerCase();
            const filtered = menuItems.filter(item => item.category.toLowerCase().includes(category));

            if (filtered.length === 0) {
                document.getElementById('categoryResult').innerHTML = '<p>No menu items found for this category</p>';
                return;
            }

            let html = '<ul>';
            filtered.forEach(item => {
                html += `<li>${item.id} - ${item.name} - ${item.category} - ${item.price}</li>`;
            });
            html += '</ul>';
            document.getElementById('categoryResult').innerHTML = html;
        }

        function showRevenueSummary() {
            const deliveredRevenue = orders
                .filter(order => order.status === 'Delivered')
                .reduce((sum, order) => sum + order.totalAmount, 0);
            document.getElementById('revenueSummary').innerHTML = `<p>Revenue from Delivered Orders: ${deliveredRevenue.toFixed(2)}</p>`;
        }

        function generateBill() {
            const orderId = document.getElementById('billOrderId').value.trim();
            const order = orders.find(o => o.orderId === orderId);

            if (!order) {
                document.getElementById('billResult').innerHTML = '<p>Order not found</p>';
                return;
            }

            const item = menuItems.find(m => m.id === order.itemId);
            const itemName = item ? item.name : order.itemId;

            document.getElementById('billResult').innerHTML = `
                <p>Order: ${order.orderId}</p>
                <p>Item: ${itemName}</p>
                <p>Quantity: ${order.quantity}</p>
                <p>Status: ${order.status}</p>
                <p>Total Bill: ${order.totalAmount.toFixed(2)}</p>
            `;
        }

        function searchOrder() {
            const orderId = document.getElementById('orderSearchId').value.trim().toLowerCase();
            const status = document.getElementById('orderStatusFilter').value;

            const filtered = orders.filter(order => {
                const idMatch = order.orderId.toLowerCase().includes(orderId);
                const statusMatch = status === 'All' || order.status === status;
                return idMatch && statusMatch;
            });

            if (filtered.length === 0) {
                document.getElementById('orderSearchResult').innerHTML = '<p>No matching orders</p>';
                return;
            }

            let html = '<ul>';
            filtered.forEach(order => {
                html += `<li>${order.orderId} - ${order.itemId} - Qty: ${order.quantity} - ${order.status} - ${order.totalAmount.toFixed(2)}</li>`;
            });
            html += '</ul>';
            document.getElementById('orderSearchResult').innerHTML = html;
        }
    </script>
</body>
</html>
