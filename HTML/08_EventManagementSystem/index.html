<!DOCTYPE html>
<html>
<head>
    <title>Event Management System</title>
</head>
<body>
    <h1>Event Management System</h1>
    
    <h2>Create Event</h2>
    <form id="eventForm">
        <input type="text" id="eventId" placeholder="Event ID" required>
        <input type="text" id="eventName" placeholder="Event Name" required>
        <input type="date" id="eventDate" placeholder="Event Date" required>
        <input type="text" id="eventVenue" placeholder="Venue" required>
        <input type="number" id="eventCapacity" placeholder="Capacity" required>
        <button type="submit">Create Event</button>
    </form>

    <h2>Events</h2>
    <table id="eventTable" border="1">
        <tr>
            <th>Event ID</th>
            <th>Event Name</th>
            <th>Date</th>
            <th>Venue</th>
            <th>Capacity</th>
            <th>Registrations</th>
            <th>Action</th>
        </tr>
    </table>

    <h2>Register for Event</h2>
    <input type="text" id="regEventId" placeholder="Event ID">
    <input type="text" id="regName" placeholder="Participant Name">
    <input type="email" id="regEmail" placeholder="Email">
    <button onclick="registerParticipant()">Register</button>

    <h2>Participants</h2>
    <table id="participantTable" border="1">
        <tr>
            <th>Event ID</th>
            <th>Participant Name</th>
            <th>Email</th>
            <th>Registration Date</th>
            <th>Action</th>
        </tr>
    </table>

    <div id="message"></div>

    <script>
        let events = [];
        let participants = [];

        document.getElementById('eventForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const event = {
                id: document.getElementById('eventId').value,
                name: document.getElementById('eventName').value,
                date: document.getElementById('eventDate').value,
                venue: document.getElementById('eventVenue').value,
                capacity: parseInt(document.getElementById('eventCapacity').value),
                registrations: 0
            };
            
            events.push(event);
            displayEvents();
            this.reset();
        });

        function displayEvents() {
            const table = document.getElementById('eventTable');
            table.innerHTML = '<tr><th>Event ID</th><th>Event Name</th><th>Date</th><th>Venue</th><th>Capacity</th><th>Registrations</th><th>Action</th></tr>';
            
            events.forEach((event, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${event.id}</td>
                    <td>${event.name}</td>
                    <td>${event.date}</td>
                    <td>${event.venue}</td>
                    <td>${event.capacity}</td>
                    <td>${event.registrations}</td>
                    <td><button onclick="deleteEvent(${index})">Delete</button></td>
                `;
                table.appendChild(row);
            });
        }

        function deleteEvent(index) {
            events.splice(index, 1);
            displayEvents();
            participants = participants.filter(p => p.eventId !== events[index].id);
            displayParticipants();
        }

        function registerParticipant() {
            const eventId = document.getElementById('regEventId').value;
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            
            const event = events.find(e => e.id === eventId);
            
            if (event && event.registrations < event.capacity) {
                const participant = {
                    eventId: eventId,
                    name: name,
                    email: email,
                    regDate: new Date().toLocaleDateString()
                };
                
                participants.push(participant);
                event.registrations++;
                displayEvents();
                displayParticipants();
                document.getElementById('message').innerHTML = '<p>Registration successful</p>';
                document.getElementById('regEventId').value = '';
                document.getElementById('regName').value = '';
                document.getElementById('regEmail').value = '';
            } else if (event && event.registrations >= event.capacity) {
                document.getElementById('message').innerHTML = '<p>Event is full</p>';
            } else {
                document.getElementById('message').innerHTML = '<p>Event not found</p>';
            }
        }

        function displayParticipants() {
            const table = document.getElementById('participantTable');
            table.innerHTML = '<tr><th>Event ID</th><th>Participant Name</th><th>Email</th><th>Registration Date</th><th>Action</th></tr>';
            
            participants.forEach((participant, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${participant.eventId}</td>
                    <td>${participant.name}</td>
                    <td>${participant.email}</td>
                    <td>${participant.regDate}</td>
                    <td><button onclick="removeParticipant(${index})">Remove</button></td>
                `;
                table.appendChild(row);
            });
        }

        function removeParticipant(index) {
            const eventId = participants[index].eventId;
            const event = events.find(e => e.id === eventId);
            if (event) event.registrations--;
            
            participants.splice(index, 1);
            displayParticipants();
            displayEvents();
        }
    </script>
</body>
</html>
